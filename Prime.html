<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>素数判定</title>
</head>
<body>

<input id="num" placeholder="数字を入力">
<button onclick="checkPrime()">判定</button>

<p id="result"></p>

<script>
function modPow(base, exp, mod) {
    let result = 1n;
    base %= mod;

    while (exp > 0n) {
        if (exp & 1n) {
            result = (result * base) % mod;
        }

        base = (base * base) % mod;
        exp >>= 1n;
    }

    return result;
}

function isPrime(n) {
    if (n < 2n) return false;
    if (n === 2n || n === 3n) return true;
    if (n % 2n === 0n) return false;

    let d = n - 1n;
    let s = 0;

    while ((d & 1n) === 0n) {
        d >>= 1n;
        s++;
    }

    const bases = [2n, 3n, 5n, 7n, 11n, 13n, 17n];

    for (const a of bases) {
        if (a >= n) continue;

        let x = modPow(a, d, n);

        if (x === 1n || x === n - 1n) {
            continue;
        }

        let composite = true;

        for (let r = 1; r < s; r++) {
            x = (x * x) % n;

            if (x === n - 1n) {
                composite = false;
                break;
            }
        }

        if (composite) {
            return false;
        }
    }

    return true;
}

function checkPrime() {
    const input =
        document
        .getElementById("num")
        .value
        .trim();

    try {
        const n = BigInt(input);

        document
        .getElementById("result")
        .textContent =
            isPrime(n)
            ? "素数です"
            : "素数ではありません";

    } catch {
        document
        .getElementById("result")
        .textContent =
            "整数を入力してください";
    }
}
</script>

</body>
</html>
